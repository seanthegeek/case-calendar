# Case Calendar config
#
# Required env vars when running:
#   COURTLISTENER_TOKEN  — your CourtListener API key
#   ANTHROPIC_API_KEY    — for the LLM extractor (default provider). Set
#                          GEMINI_API_KEY or OPENAI_API_KEY instead if you
#                          prefer those — auto-detect priority is
#                          anthropic > gemini > openai per
#                          model-comparison/SCORECARD.md
#
# Run order:
#   case-calendar -c config.yaml setup gcal   # one-time OAuth (only if pushing to gcal)
#   case-calendar -c config.yaml setup m365   # one-time OAuth (only if pushing to M365)
#   case-calendar -c config.yaml sync         # backfill + auto-emit to all configured backends
#   case-calendar -c config.yaml serve        # real-time webhook receiver + auto-emit
#   case-calendar -c config.yaml show         # sanity check

# Required — SQLite database that tracks processed docket entries, extracted
# hearings and deadlines, AI case summaries, and webhook idempotency keys.
# Created on first run; safe to back up by copying the file while the
# daemon is stopped (or with `.backup` from the sqlite3 shell while running).
store_path: data/case-calendar.sqlite

# Optional — only needed if any calendar has google_calendar_id set.
# Push auto-enables once `case-calendar setup gcal` has staged the token
# cache at google_token_path. Get the credentials JSON from Google Cloud
# Console (OAuth client of type "Desktop app").
# google_credentials_path: tokens/google-credentials.json
# google_token_path:       tokens/google-token.json

# Optional — only needed if any calendar has m365_calendar_id set (or
# m365_use_default_calendar: true). Push auto-enables once
# `case-calendar setup m365` has staged the AuthenticationRecord at
# m365_token_path. Register a multi-tenant "public client" application
# in Azure AD / Entra and put its Application (client) ID here.
# m365_client_id:    "00000000-0000-0000-0000-000000000000"
# m365_token_path:   tokens/m365-token.json

# Optional — generate a static index.html alongside the ICS files. The
# page lists every calendar (with one-click subscribe links) and every
# tracked case (with docket links, date filed, and last activity), and
# is sortable client-side. Pair with a static HTTPS server like Caddy
# pointed at the `out/` directory (see Caddyfile in repo root).
#
# `public_base_url` is the URL where Caddy serves the `out/` directory.
# When set, the index emits absolute https:// + webcal:// subscribe links;
# omit it to use bare relative filenames (which still work for opening
# index.html locally, but not for one-click subscribe).
#
# `site_title` is the <h1> of the page.
#
# `site_description` is the <meta name="description"> content (used by search
# engines and link-preview cards). Defaults to a generic function-based
# description; override per-deployment if you want to lean into your docket
# mix (e.g. "Hearing and deadline feeds for DPRK IT-worker prosecutions and
# AI litigation."). Keep it under ~160 characters so it isn't truncated.
# index_path:        out/index.html
# public_base_url:   https://calendars.example.com
# site_title:        "Case Calendar"
# site_description:  "Subscribable calendar feeds for federal court hearings and filing deadlines, sourced from CourtListener and RECAP."

# Optional — auto-subscribe configured dockets to CourtListener docket
# alerts so the webhook receiver gets DOCKET_ALERT pushes for every
# tracked docket without manual subscription clicks in the CourtListener UI.
#
# When enabled (the default), every `case-calendar sync` and
# `case-calendar serve` startup lists the account's existing alert
# subscriptions, compares against the union of docket ids configured
# under `cases:` below, and POSTs a new subscription for any docket
# that isn't already covered. Failures are logged but don't abort
# sync / serve — polling still works without webhook alerts.
#
# Set to `false` if you configure docket alerts via some other surface
# (a CSV import to CourtListener, an admin tool, etc.) and don't want
# this project to maintain the subscription list.
# ensure_docket_alerts: true

# Optional — AI-generated per-docket summaries on the index page.
#
# When enabled, `case-calendar summarize` walks each docket for its primary
# document (latest indictment / amended complaint / etc.) plus any disposition
# documents (judgment, plea agreement, verdict, dismissal), feeds the PDF
# text to a higher-tier LLM, and writes a 2-4 sentence prose summary to the
# `case_summaries` table. The index renderer surfaces these summaries
# alongside each case; a static footer disclaimer ("Case descriptions are
# generated by AI and may contain mistakes" + presumption-of-innocence) is
# included automatically when the page renders.
#
# Cost note: this runs on the higher-tier summary model for your
# provider (Sonnet / Gemini Pro / GPT-5.4) — the synthesis task
# warrants the upgrade over the small/fast extractor tier. Budget is
# roughly $0.10-0.60 per docket for the first run, near-zero on
# subsequent runs (existing summary rows are reused; pass `--force`
# to overwrite after a prompt or model change).
#
# Provider defaults: anthropic/claude-sonnet-4-6,
# gemini/gemini-2.5-pro, openai/gpt-5.4. Override via `provider` /
# `model` here, or set LLM_SUMMARY_PROVIDER / LLM_SUMMARY_MODEL in
# .env (config wins if both). The summary track uses the LLM_PROVIDER
# global default unless explicitly overridden, so by default it
# follows whatever you set for the extraction track. Splitting the
# tracks (Gemini extraction + Anthropic summaries, etc.) remains
# supported via the per-track override env vars but is no longer the
# documented default — see model-comparison/SCORECARD.md for the
# legal-priors / maintenance-treadmill reasoning behind the 0.10.0
# reversion to Anthropic-for-both.
# case_summaries:
#   enabled: true
#   # provider: anthropic
#   # model: claude-sonnet-4-6
#   # allow_ocr: true        # set false to skip slow tesseract fallback
#   # debounce_seconds: 300  # webhook-only: wait this many seconds of
#                            # quiet after the last stale-flagging entry
#                            # before regenerating, so a burst of PACER
#                            # uploads coalesces into one Sonnet call
#                            # rather than firing per webhook delivery.
#                            # Default 300 (5 minutes). Ignored by
#                            # `case-calendar sync` — polling is a single
#                            # batch already, so it refreshes immediately.

calendars:
  cybercrime:
    name: "Cybercrime cases"
    ics_path: out/cybercrime.ics
    # google_calendar_id: abc123@group.calendar.google.com
    #
    # Optional: add arbitrary email addresses as event attendees. They get
    # the Google invite + the event lands on their own calendar. Their own
    # default reminder settings determine pre-event notifications.
    #
    # PRIVACY WARNING: attendee emails are visible to anyone with view
    # access to the event. If you intend to make this calendar public, do
    # NOT set notify_emails — anyone reading the public feed (or the
    # ATTENDEE lines in a public ICS) will see the addresses you list.
    # Use `reminders` (popup) instead and let attendees subscribe to the
    # public feed in their own calendar apps.
    # notify_emails:
    #   - alerts@example.com
    #
    # Optional: per-event reminders.
    #
    #   method=popup  → fires in the calendar app of whoever is viewing
    #                   the event. In Google, this is the calendar owner;
    #                   in a subscribed ICS it's the subscriber. Safe to
    #                   ship on a public calendar — VALARM:DISPLAY blocks
    #                   don't leak email.
    #   method=email  → in Google, only delivered to the calendar owner.
    #                   In ICS, rendered as VALARM;ACTION:EMAIL with
    #                   ATTENDEE lines, so emails ARE visible to anyone
    #                   reading the public feed. Avoid on public calendars.
    #
    # reminders:
    #   - {method: popup, minutes: 30}
    #   - {method: popup, minutes: 1440}    # 1 day before
    #   - {method: email, minutes: 1440}    # owner-only in Google; visible in public ICS
  tech:
    name: "Tech cases"
    ics_path: out/tech.ics
    # google_calendar_id: def456@group.calendar.google.com
    #
    # Optional: Microsoft 365 / Outlook push. Set m365_calendar_id to the
    # target Outlook calendar's id (find via Graph Explorer:
    # GET /me/calendars), or set m365_use_default_calendar: true to push
    # to the user's primary calendar. Requires the top-level
    # m365_client_id above and one interactive run to stage auth.
    # m365_calendar_id: AAMkADExAAA...   # Outlook calendar id
    # m365_use_default_calendar: true
  natsec:
    name: "National security cases"
    ics_path: out/natsec.ics

cases:
  # `dockets:` is a list of CourtListener docket_ids. Two patterns:
  #
  #   1. Parallel proceedings — district + appellate or related filings
  #      in different venues with different docket numbers (the Anthropic
  #      v. DOW shape below). Case Calendar renders one summary
  #      paragraph and one docket link per logical PACER docket.
  #
  #   2. CourtListener sibling docket_ids — multiple docket_id rows that
  #      all map to the same (docket_number, court_id). This happens
  #      when the upstream pacer_case_id changed mid-life and
  #      CourtListener stored the docket under two or more docket_ids
  #      (CourtListener issue #7345). List every sibling so the AI
  #      summary pools entries across them into one complete view; the
  #      renderer collapses siblings to one paragraph and one docket
  #      link. The link goes to whichever docket_id you list first, so
  #      put your preferred CourtListener page first (typically the one with the
  #      most CourtListener-side content).
  #
  # See docs/configuration.md for the full discussion.
  # ---- Anthropic v. DOW family ----
  - id: anthropic-v-dow
    name: "Anthropic v. DOW"
    calendar: tech
    dockets: [72380208, 72379655, 73136734]
    # `tags` are topical labels (e.g. DPRK, PRC, Russia) that show up
    # on each calendar event's description AND as click-to-filter chips
    # on the HTML index. Each tag added to the search bar filters via the
    # same AND-substring match the typed query uses, so a subscriber can
    # search `DPRK` then `sentencing` to narrow further. Tags are deduped
    # case-insensitively; the rendered casing is whatever you typed here.
    tags: [defense, AI, LLM]
    # When you aggregate multiple related dockets under one case_id, an
    # optional one-sentence note gives the AI summarizer a framing hint so
    # the rendered summaries read like they were written by someone who
    # understands the litigation strategy rather than a per-docket
    # description in isolation. Only used by the `summarize` command.
    aggregation_note: "parallel suits challenging separate Department of War actions taken under distinct statutory authorities, each filed in the proper venue for the action it targets"
    
    # Per-case override of the calendar's notify_emails / reminders. Useful
    # when one case warrants different alerts than the rest of the calendar.
    # notify_emails: [counsel@example.com]
    # reminders:
    #   - {method: popup, minutes: 60}

  # ---- DPRK IT-worker prosecutions ----
  # Filing deadlines are tracked on every docket uniformly — civil,
  # criminal, appellate, magistrate — and significance ('major' / 'minor')
  # decides what reaches subscriber calendars. So pretrial motion practice
  # (suppression / in-limine / Daubert), sentencing-memo deadlines, and PSR
  # objections all flow through automatically.
  - id: us-v-ashtor
    name: "United States v. Ashtor"
    calendar: cybercrime
    dockets: [69570297]
    tags: [DPRK, IT worker fraud]

  - id: us-v-knoot
    name: "United States v. Knoot"
    calendar: cybercrime
    dockets: [69026861]
    tags: [DPRK, IT worker fraud, laptop farm]

  # Two separate Wang defendants (Zhenxing Wang and Kejia "Tony" Wang) were
  # charged in the District of Massachusetts in the same DPRK IT-worker
  # conspiracy — different first names, separate dockets. The pattern of one
  # indictment + one information in the same conspiracy is the textbook
  # signal of a cooperating co-defendant: the information is filed only
  # after the defendant waives grand jury indictment, which usually means
  # they've agreed to plead and cooperate. Track them as distinct cases so
  # the calendar / summaries don't conflate them.
  - id: us-v-zhenxing-wang
    name: "United States v. Zhenxing Wang"
    calendar: cybercrime
    dockets: [70678228]
    tags: [DPRK, IT worker fraud]

  - id: us-v-kejia-wang
    name: "United States v. Kejia \"Tony\" Wang"
    calendar: cybercrime
    dockets: [70691920]
    tags: [DPRK, IT worker fraud]

  - id: us-v-didenko
    name: "United States v. Didenko"
    calendar: cybercrime
    dockets: [68810724]
    tags: [DPRK, IT worker fraud, marketplace]

  - id: us-v-jin
    name: "United States v. Kim Kwang Jin et al."
    calendar: cybercrime
    dockets: [70673091]
    tags: [DPRK, IT worker fraud]

  - id: us-v-hwa
    name: "United States v. Jong Song Hwa et al."
    calendar: cybercrime
    dockets: [69459808]
    tags: [DPRK, IT worker fraud]

  - id: us-v-chapman
    name: "United States v. Chapman"
    calendar: cybercrime
    dockets: [68534169]
    tags: [DPRK, IT worker fraud, laptop farm]

  # `extra_documents` is for documents the public should be able to see
  # but that CourtListener / PACER are not surfacing — e.g. an unsealed
  # indictment whose docket entries are still hidden by a data bug, or a
  # sentencing order that wasn't uploaded to RECAP. Each entry is fetched
  # at summary-generation time and folded into the primary-document or
  # disposition set as if it had come from CourtListener. The `note` is trusted
  # operator context shown to the LLM (the document TEXT itself is still
  # treated as untrusted, the same way CourtListener / PACER text is).
  #
  # Worked example below: Xu Zewei, charged in S.D. Tex. 4:23-cr-00523
  # with the HAFNIUM-era Microsoft Exchange intrusions and extradited
  # from Italy in 2025. The docket has two distinct upstream gaps,
  # each worked around by its own `extra_documents` entry:
  #
  #   (a) docket entries 1-4 — including the original indictment —
  #       remain sealed in the public record at the courthouse level
  #       even though the seal was lifted in connection with
  #       extradition. This is an upstream sealing decision on the
  #       court's side, NOT a CourtListener data bug, and won't
  #       resolve until the clerk re-uploads the unsealed copies.
  #       The DoJ press release attachment is the only public copy
  #       of the indictment in the meantime.
  #
  #   (b) entry 20's PDF (the agreed motion to designate the case
  #       as complex) is reachable directly from CourtListener's storage
  #       bucket, but the v4 API reports `is_available: false` because
  #       the file was uploaded under an older `pacer_case_id` (1940635)
  #       than the docket's current one (1940634), and CourtListener's
  #       availability reconciler matches on the current id only
  #       (CourtListener bug https://github.com/freelawproject/courtlistener/issues/7345,
  #       closed by FLP without a committed fix — entries like this
  #       are likely to remain CourtListener-invisible indefinitely until
  #       someone re-uploads the file to PACER under the docket's current
  #       pacer_case_id).
  #
  # You don't have to monitor for upstream gap closure. If the file
  # eventually becomes findable via CourtListener (re-upload under the
  # new pacer_case_id, or a future reconciler change), the summary
  # pipeline compares a normalized-text fingerprint of every extra
  # against every CourtListener-surfaced doc on the same docket group and silently
  # drops the duplicate before it reaches the LLM, with a WARN log
  # naming the URL so you can clean up `config.yaml` at your leisure.
  # Keep operator `note` text short — just identify the document;
  # details about the upstream gap belong in this comment block, not
  # in the note, since the note is shown to the summary LLM and
  # bug/workaround context only confuses the summary.
  #
  # Fields (all required):
  #   docket   integer  — must be one of this case's `dockets` ids
  #   url      string   — absolute https:// URL to a PDF
  #   note     string   — required. Tells the summary LLM what the
  #                       document is and why it was added — the operator's
  #                       natural-language description carries more meaning
  #                       than any rigid role taxonomy would (real-world
  #                       documents don't always slot cleanly into
  #                       "pleading" vs "disposition"). The note rides
  #                       into the prompt as trusted operator metadata;
  #                       the document TEXT itself is still treated as
  #                       untrusted in the same way as CourtListener / PACER text.
  - id: us-v-zewei
    name: "United States v. Zewei"
    calendar: cybercrime
    dockets: [70789744]
    tags: [PRC, China]
    extra_documents:
      - docket: 70789744
        url: https://www.justice.gov/opa/media/1407196/dl
        note: >-
          This PDF is the unsealed indictment in S.D. Tex. case
          4:23-cr-00523 (United States v. Xu Zewei).
      - docket: 70789744
        url: https://storage.courtlistener.com/recap/gov.uscourts.txsd.1940635/gov.uscourts.txsd.1940635.20.0_1.pdf
        note: >-
          This PDF is "Government's Agreed Motion to Designate the
          Case as Complex under the Speedy Trial Act and for
          Continuance" — docket entry 20 in S.D. Tex. 4:23-cr-00523
          (United States v. Xu Zewei).

  # ---- National security ----
  - id: us-v-mcgonigal
    name: "United States v. McGonigal"
    calendar: natsec
    dockets: [66749883]
    tags: [Russia, espionage]
