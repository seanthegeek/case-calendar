# case-calendar config
#
# Required env vars when running:
#   COURTLISTENER_TOKEN  — your CL API key
#   ANTHROPIC_API_KEY    — for the LLM extractor
#
# Run order:
#   case-calendar -c config.yaml sync     # pull updates, fill the store
#   case-calendar -c config.yaml emit     # write ICS files (and push gcal)
#   case-calendar -c config.yaml show     # sanity check

store_path: data/case-calendar.sqlite
model: claude-opus-4-7

# Optional — only needed if any calendar has google_calendar_id set and you
# pass --push-gcal to `emit`. Get this from Google Cloud Console (OAuth client
# of type "Desktop app").
# google_credentials_path: ~/.case-calendar/google-credentials.json
# google_token_path:       ~/.case-calendar/google-token.json

# Optional — only needed if any calendar has m365_calendar_id set (or
# m365_use_default_calendar: true) and you pass --push-m365. Register a
# multi-tenant "public client" application in Azure AD / Entra and put its
# Application (client) ID here. The first run of `emit --push-m365` opens
# a browser to grant Calendars.ReadWrite; the daemon (`serve --push-m365`)
# then reuses the cached AuthenticationRecord.
# m365_client_id:    "00000000-0000-0000-0000-000000000000"
# m365_token_path:   ~/.case-calendar/m365-token.json

calendars:
  cybercrime:
    name: "Cybercrime cases"
    ics_path: out/cybercrime.ics
    # google_calendar_id: abc123@group.calendar.google.com
    #
    # Optional: add arbitrary email addresses as event attendees. They get
    # the Google invite + the event lands on their own calendar. Their own
    # default reminder settings determine pre-event notifications.
    #
    # PRIVACY WARNING: attendee emails are visible to anyone with view
    # access to the event. If you intend to make this calendar public, do
    # NOT set notify_emails — anyone reading the public feed (or the
    # ATTENDEE lines in a public ICS) will see the addresses you list.
    # Use `reminders` (popup) instead and let attendees subscribe to the
    # public feed in their own calendar apps.
    # notify_emails:
    #   - alerts@example.com
    #
    # Optional: per-event reminders.
    #
    #   method=popup  → fires in the calendar app of whoever is viewing
    #                   the event. In Google, this is the calendar owner;
    #                   in a subscribed ICS it's the subscriber. Safe to
    #                   ship on a public calendar — VALARM:DISPLAY blocks
    #                   don't leak email.
    #   method=email  → in Google, only delivered to the calendar owner.
    #                   In ICS, rendered as VALARM;ACTION:EMAIL with
    #                   ATTENDEE lines, so emails ARE visible to anyone
    #                   reading the public feed. Avoid on public calendars.
    #
    # reminders:
    #   - {method: popup, minutes: 30}
    #   - {method: popup, minutes: 1440}    # 1 day before
    #   - {method: email, minutes: 1440}    # owner-only in Google; visible in public ICS
  tech:
    name: "Tech court cases"
    ics_path: out/tech.ics
    # google_calendar_id: def456@group.calendar.google.com
    #
    # Optional: Microsoft 365 / Outlook push. Set m365_calendar_id to the
    # target Outlook calendar's id (find via Graph Explorer:
    # GET /me/calendars), or set m365_use_default_calendar: true to push
    # to the user's primary calendar. Requires the top-level
    # m365_client_id above and one interactive run to stage auth.
    # m365_calendar_id: AAMkADExAAA...   # Outlook calendar id
    # m365_use_default_calendar: true

cases:
  # ---- Anthropic v. DOW family ----
  - id: anthropic-v-dow
    name: "Anthropic PBC v. United States Department of War"
    calendar: tech
    dockets: [72380208, 72379655, 73136734]
    # Per-case override of the calendar's notify_emails / reminders. Useful
    # when one case warrants different alerts than the rest of the calendar.
    # notify_emails: [counsel@example.com]
    # reminders:
    #   - {method: popup, minutes: 60}

  # ---- DPRK IT-worker prosecutions ----
  # Filing deadlines are auto-detected from each docket's number: civil
  # dockets (':cv-') get deadline tracking automatically, routine criminal
  # dockets (':cr-' / ':cm-') skip it. Set `extract_deadlines: true` on a
  # serious criminal trial where pretrial motion practice (suppression /
  # in-limine / Daubert / sentencing memos) is itself worth watching.
  - id: us-v-ashtor
    name: "United States v. Ashtor (DPRK IT worker)"
    calendar: cybercrime
    dockets: [69570297]
    # extract_deadlines: true     # uncomment for big-trial deadline tracking

  - id: us-v-knoot
    name: "United States v. Knoot (DPRK IT worker)"
    calendar: cybercrime
    dockets: [69026861]

  - id: us-v-wang
    name: "United States v. Wang (DPRK IT worker)"
    calendar: cybercrime
    dockets: [70678228, 70691920]

  - id: us-v-didenko
    name: "United States v. Didenko"
    calendar: cybercrime
    dockets: [68810724, 68810897]

  - id: us-v-jin
    name: "United States v. Kim Kwang Jin et al."
    calendar: cybercrime
    dockets: [70673091]

  - id: us-v-hwa
    name: "United States v. Jong Song Hwa et al."
    calendar: cybercrime
    dockets: [69459808]

  # ---- Other tech / cyber ----
  - id: us-v-mcgonigal
    name: "United States v. McGonigal"
    calendar: cybercrime
    dockets: [66749883]
