coverage:
  status:
    project:
      default:
        # Allow small unrelated drops (< 1 percentage point) without
        # failing. The actual project floor is the 90% per-module
        # invariant documented in AGENTS.md, which the CI
        # `pytest --cov-fail-under` step enforces on its own —
        # Codecov's job here is to flag gaps in NEW code, not
        # policy-enforce the project floor.
        target: auto
        threshold: 1%
    patch:
      default:
        # New code (the diff) must be covered at the project's current
        # level — `auto` resolves to the base commit's overall coverage
        # (~97% at the time of writing). The earlier 90% target was
        # loose enough that PR #3 merged with patch=93.83% and left 14
        # uncovered branches in newly-added code, which we then had to
        # clean up in PR #5. `auto` catches that class of gap at PR
        # time instead. Trade-off: very small PRs (a handful of lines)
        # are forced toward 100% diff coverage; if that ever bites a
        # legitimate defensive branch, the right escape hatch is to
        # either delete the branch (AGENTS.md treats unreachable
        # defensive code as a test smell) or write the test.
        target: auto

# Show inline annotations on the PR diff so uncovered lines are
# visible right where they were added, not just in the summary.
github_checks:
  annotations: true
