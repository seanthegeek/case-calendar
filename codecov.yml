coverage:
  status:
    project:
      default:
        # Allow small unrelated drops (< 1 percentage point) without
        # failing. The actual project floor is the 90% per-module
        # invariant documented in AGENTS.md, which the CI
        # `pytest --cov-fail-under` step enforces on its own —
        # Codecov's job here is to flag gaps in NEW code, not
        # policy-enforce the project floor.
        target: auto
        threshold: 1%
    patch:
      default:
        # New code (the diff) should be 90%+ covered. This is where
        # gaps actually matter — a PR that adds an uncovered branch
        # is the failure mode worth catching, even when overall
        # project coverage is still healthy.
        target: 90%

# Show inline annotations on the PR diff so uncovered lines are
# visible right where they were added, not just in the summary.
github_checks:
  annotations: true
