name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same branch when a new commit lands —
# we only need the latest result, not every intermediate one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python and dependencies
        # ``--extra lint`` pins ruff; ``--extra test`` gives pyright the
        # same import-resolution env the test job uses (otherwise it
        # flags every `import pytest` / `import yaml` as missing).
        run: uv sync --extra lint --extra test

      - name: Ruff lint
        run: uv run ruff check case_calendar tests

      - name: Ruff format check
        run: uv run ruff format --check case_calendar tests

      - name: Docs in sync with runtime prompts
        # docs/llm-prompts.md reproduces the system prompts verbatim; this
        # fails the build if a prompt edit in case_calendar/llm.py didn't
        # re-run the generator. Fix locally with:
        #   python scripts/sync_llm_prompts_doc.py
        run: uv run python scripts/sync_llm_prompts_doc.py --check

      - name: Pyright
        # PYRIGHT_PYTHON_FORCE_VERSION=latest pulls the newest pyright
        # release rather than whatever the pyright-python wrapper is
        # currently pinned to. AGENTS.md's "Python Code Style" requires
        # the latest pyright for type checking.
        env:
          PYRIGHT_PYTHON_FORCE_VERSION: latest
        run: uv run --with pyright pyright case_calendar tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          # Cache the uv-managed virtualenv + Python install across runs so
          # the test job starts in seconds once warm.
          enable-cache: true

      - name: Install Python and dependencies
        # requires-python = ">=3.13" in pyproject.toml; uv resolves and
        # installs the matching interpreter. --extra test pulls in pytest
        # and pytest-cov.
        run: uv sync --extra test

      - name: Run tests with branch coverage
        # --cov-fail-under is the regression floor, not the bar to clear.
        # The local invariant in AGENTS.md is "touched modules held or
        # gained coverage"; 90% here just catches major drops (deleted
        # test files, wholesale rewrites) without flagging the ±1pp noise
        # that legitimate refactors cause.
        run: |
          uv run pytest \
            --cov=case_calendar \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            --junitxml=junit.xml \
            -o junit_family=legacy

      - name: Upload coverage reports to Codecov
        # Codecov requires a token even for public repos (drive-by uploads
        # from forked PRs are otherwise rejected). Add the CODECOV_TOKEN
        # secret in Settings → Secrets and variables → Actions; grab the
        # value from codecov.io's repo settings. fail_ci_if_error=false
        # keeps a transient Codecov outage from breaking the build.
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        # Feeds Codecov Test Analytics (flaky-test detection, per-test
        # history). Runs even on test failure so failed cases still get
        # reported. Uses the same CODECOV_TOKEN as the coverage upload.
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
